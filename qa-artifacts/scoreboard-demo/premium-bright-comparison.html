<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scoreboard premium brightness comparison</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; background: #07101f; color: #fff; font-family: sans-serif; }
      main { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px; }
      figure { margin: 0; }
      figcaption { margin-bottom: 8px; font-size: 16px; font-weight: 700; }
      img { display: block; width: 100%; height: auto; border: 1px solid #466884; }
    </style>
  </head>
  <body>
    <main>
      <figure>
        <figcaption>原机器人科技版</figcaption>
        <img src="demo-tech-source-1280x720.png" alt="原机器人科技版" />
      </figure>
      <figure>
        <figcaption>提亮后的 premium 版</figcaption>
        <img src="demo-tech-premium-bright-final.png" alt="提亮后的 premium 版" />
      </figure>
    </main>
  </body>
</html>
